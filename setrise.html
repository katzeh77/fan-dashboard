<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reef Controller PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body { background:#0b1d1f; color:white; font-family:Arial; }
.top { background:red; padding:10px; }

canvas {
  background:#021416;
  margin-top:10px;
  touch-action:none;
}

button { margin:5px; padding:8px; }
</style>
</head>

<body>

<div class="top">
<button onclick="savePreset('day')">Save Day</button>
<button onclick="loadPreset('day')">Load Day</button>
</div>

<canvas id="chart" height="120"></canvas>

<p id="info">Klik garis = pilih channel | Geser = ubah</p>

<script>

// ================= MQTT =================
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

let schedule = Array(24).fill().map(()=>Array(8).fill(0));
let selectedChannel = 0;

const colors = [
"#0033ff","#00ccff","#9900ff","#ff0000",
"#00ff00","#ffffff","#cc00ff","#ffaa00"
];

function send(){
  client.publish("reef/schedule", JSON.stringify({data:schedule}));
}

// ================= CHART =================
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");

const chart = new Chart(ctx,{
  type:'line',
  data:{
    labels:[...Array(24).keys()],
    datasets:colors.map((c,i)=>({
      label:"CH"+(i+1),
      borderColor:c,
      data:schedule.map(h=>h[i]),
      tension:0.3,
      borderWidth:2
    }))
  },
  options:{
    responsive:true,
    plugins:{ legend:{labels:{color:"white"}} },
    scales:{
      x:{ticks:{color:"white"}},
      y:{min:0,max:100,ticks:{color:"white"}}
    },
    onClick:(evt,elements)=>{
      if(elements.length>0){
        selectedChannel = elements[0].datasetIndex;
        highlight();
        info(`Pilih CH${selectedChannel+1}`);
      }
    }
  }
});

function highlight(){
  chart.data.datasets.forEach((d,i)=>{
    d.borderWidth = (i===selectedChannel)?5:2;
  });
  chart.update();
}

function redraw(){
  chart.data.datasets.forEach((d,i)=>{
    d.data = schedule.map(h=>h[i]);
  });
  chart.update();
}

function info(t){
  document.getElementById("info").innerText = t;
}

// ================= CORE UPDATE =================
function setValue(clientX, clientY){
  const rect = canvas.getBoundingClientRect();

  let x = clientX - rect.left;
  let y = clientY - rect.top;

  let hour = Math.floor(x / rect.width * 24);
  hour = Math.max(0, Math.min(23, hour));

  let value = 100 - (y / rect.height * 100);
  value = Math.max(0, Math.min(100, value));

  schedule[hour][selectedChannel] = value;

  info(`CH${selectedChannel+1} | Jam ${hour} = ${value.toFixed(0)}%`);

  redraw();
  send();
}

// ================= SMART INPUT SYSTEM =================
let startX=0, startY=0;
let isDragging=false;
const threshold = 8; // px

function startInput(x,y){
  startX=x;
  startY=y;
  isDragging=false;
}

function moveInput(x,y){
  let dx = Math.abs(x-startX);
  let dy = Math.abs(y-startY);

  // baru dianggap drag kalau gerak cukup jauh
  if(dx>threshold || dy>threshold){
    isDragging=true;
    setValue(x,y);
  }
}

function endInput(){
  isDragging=false;
}

// ================= DESKTOP =================
canvas.addEventListener("mousedown", e=>{
  startInput(e.clientX,e.clientY);
});

canvas.addEventListener("mousemove", e=>{
  moveInput(e.clientX,e.clientY);
});

canvas.addEventListener("mouseup", ()=>{
  endInput();
});

// ================= TOUCH HP =================
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  let t=e.touches[0];
  startInput(t.clientX,t.clientY);
});

canvas.addEventListener("touchmove", e=>{
  e.preventDefault();
  let t=e.touches[0];
  moveInput(t.clientX,t.clientY);
});

canvas.addEventListener("touchend", ()=>{
  endInput();
});

// ================= PRESET =================
function savePreset(name){
  localStorage.setItem(name, JSON.stringify(schedule));
}

function loadPreset(name){
  let d=localStorage.getItem(name);
  if(d){
    schedule=JSON.parse(d);
    redraw();
    send();
  }
}

</script>
</body>
</html>
