<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f1a;
  color:#fff;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111827;
  position:sticky;
  top:0;
}

#clock{
  font-size:14px;
  color:#9ca3af;
}

/* STATUS */
#status{
  text-align:center;
  padding:8px;
  font-size:14px;
}

/* CARD */
.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

/* BUTTON */
button{
  width:48%;
  padding:12px;
  margin:1%;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
  font-size:14px;
}

button:active{
  background:#1d4ed8;
}

/* INPUT */
input{
  width:100%;
  padding:8px;
  border-radius:8px;
  border:none;
  margin-bottom:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:5px;
}

/* TEMP */
.temp{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  A8 Reef Controller
  <div id="clock">--:--</div>
</div>

<div id="status">🔌 Connecting...</div>

<div class="card">
  <button onclick="setMode(1)">AUTO</button>
  <button onclick="setMode(0)">MANUAL</button>
</div>

<div class="card temp">
  <div>🌡️ Suhu Atas: <span id="t1">--</span> °C</div>
  <div>🌡️ Suhu Bawah: <span id="t2">--</span> °C</div>
</div>

<div class="card">
  Batas Suhu:
  <input type="number" id="maxTemp" value="50">
  <button onclick="setTemp()">SAVE</button>
</div>

<div id="channels"></div>

<script>

// ===== MQTT =====
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const statusEl = document.getElementById('status');
const container = document.getElementById('channels');

// ===== NAMA CHANNEL =====
const names = [
"Royal Blue","Blue","Indigo","Red",
"Green","White","Sump"
];

// ===== UI CHANNEL =====
names.forEach((n,i)=>{
  let ch=i+1;

  container.innerHTML += `
  <div class="card">
    <b>${n}</b>

    <div class="grid">
      <input type="time" id="on${ch}">
      <input type="time" id="peak${ch}">
      <input type="time" id="off${ch}">
      <input type="number" id="max${ch}" value="80">
    </div>

    <button onclick="save(${ch})">SAVE</button>
  </div>`;
});

// ===== CLOCK =====
function updateClock(){
  let d=new Date();
  let h=d.getHours().toString().padStart(2,'0');
  let m=d.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').innerText = h+":"+m;
}
setInterval(updateClock,1000);

// ===== MQTT =====
client.on('connect',()=>{
  statusEl.innerHTML="✅ Connected";
  statusEl.style.color="#0f0";

  client.subscribe("suhu/ntc1");
  client.subscribe("suhu/ntc2");
});

client.on('message',(topic,msg)=>{
  let m=msg.toString();

  if(topic=="suhu/ntc1"){
    document.getElementById('t1').innerText=parseFloat(m).toFixed(1);
  }

  if(topic=="suhu/ntc2"){
    document.getElementById('t2').innerText=parseFloat(m).toFixed(1);
  }
});

// ===== MODE =====
function setMode(v){
  client.publish("mode", v==1?"auto":"manual");
  alert("Mode: "+(v?"AUTO":"MANUAL"));
}

// ===== SAVE TEMP =====
function setTemp(){
  let val=document.getElementById('maxTemp').value;
  client.publish("set/batasSuhu", val);
  alert("Batas suhu dikirim");
}

// ===== TIME CONVERT =====
function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60 + parseInt(m);
}

// ===== SAVE SCHEDULE =====
function save(ch){
  let on = toMin(document.getElementById('on'+ch).value);
  let peak = toMin(document.getElementById('peak'+ch).value);
  let off = toMin(document.getElementById('off'+ch).value);
  let max = Math.round(document.getElementById('max'+ch).value * 2.55);

  let data = `${on},${peak},${off},${max}`;

  client.publish("set/schedule/"+ch, data);

  alert("Saved CH"+ch);
}

</script>

</body>
</html>
