<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111827;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

button{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button:active{ background:#1d4ed8; }

input{
  width:100%;
  margin-bottom:5px;
  border-radius:8px;
  border:none;
  padding:6px;
}

.row{
  display:flex;
  gap:5px;
}

.row input{
  flex:1;
}

#status{
  text-align:center;
  padding:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">A8 Controller</div>
<div id="status">🔌 Connecting...</div>

<div class="card">
<button onclick="setMode('auto')">AUTO</button>
<button onclick="setMode('manual')">MANUAL</button>
</div>

<div id="channels"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const container = document.getElementById('channels');
const statusEl = document.getElementById('status');

const labels = [
"Royal Blue","Blue","Indigo","Red",
"Green","White","Sump"
];

// ===== UI =====
for(let i=1;i<=7;i++){
  container.innerHTML += `
  <div class="card">
    <h3>${labels[i-1]}</h3>

    <div class="row">
      ON <input type="time" id="on${i}">
      PEAK <input type="time" id="peak${i}">
    </div>

    <div class="row">
      OFF <input type="time" id="off${i}">
      MAX <input type="number" id="max${i}" value="80">
    </div>

    <button onclick="setSch(${i})">SAVE SCHEDULE</button>

    <hr>

    <div>
      Manual (%) :
      <input type="number" id="man${i}" value="0">
      <button onclick="setManual(${i})">SET MANUAL</button>
    </div>
  </div>`;
}

// ===== MQTT =====
client.on('connect',()=>{
  statusEl.innerHTML="✅ Connected";
  statusEl.style.color="#0f0";
});

client.on('error',()=>{
  statusEl.innerHTML="❌ Error";
  statusEl.style.color="#f00";
});

// ===== MODE =====
function setMode(mode){
  client.publish('mode',mode);
  alert("Mode: "+mode.toUpperCase());
}

// ===== TIME =====
function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}

// ===== SAVE SCHEDULE =====
function setSch(i){
  let on = toMin(document.getElementById('on'+i).value);
  let peak = toMin(document.getElementById('peak'+i).value);
  let off = toMin(document.getElementById('off'+i).value);
  let max = Math.round(document.getElementById('max'+i).value*2.55);

  let data = `${on},${peak},${off},${max}`;

  client.publish(`set/schedule/${i}`,data);
  alert("Schedule CH"+i+" tersimpan");
}

// ===== MANUAL CONTROL =====
function setManual(i){
  let val = parseInt(document.getElementById('man'+i).value);

  if(isNaN(val)) val=0;
  val = Math.max(0,Math.min(100,val));

  let pwm = Math.round(val*2.55);

  client.publish(`manual/${i}`,pwm.toString());

  alert("Manual CH"+i+" = "+val+"%");
}
</script>

</body>
</html>
