<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111827;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

button.active{
  background:#22c55e;
}

input{
  width:100%;
  margin-bottom:5px;
}

#status{
  text-align:center;
  padding:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">A8 Controller</div>

<div id="status">🔌 Connecting...</div>

<!-- JAM -->
<div class="card" style="text-align:center;">
  <div id="clock">--:--:--</div>
</div>

<!-- SUHU -->
<div class="card">
  Suhu Atas: <span id="t1">--</span> °C<br>
  Suhu Bawah: <span id="t2">--</span> °C<br>
  Status: <span id="statusSuhu">--</span>
</div>

<!-- BATAS SUHU -->
<div class="card">
  Batas Suhu:
  <input type="number" id="maxTemp" value="50">
  <button onclick="saveTemp()">SAVE</button>
</div>

<!-- IDLE -->
<div class="card">
  Idle Time (menit):
  <input type="number" id="idle" value="0">
  <button onclick="saveIdle()">SAVE</button>
</div>

<!-- MODE -->
<div class="card">
  <button id="btnAuto" onclick="setMode('auto')">AUTO</button>
  <button id="btnManual" onclick="setMode('manual')">MANUAL</button>
</div>

<!-- CHANNEL -->
<div id="channels"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const container = document.getElementById('channels');
const statusEl = document.getElementById('status');

// ===== CLOCK =====
setInterval(()=>{
  let d=new Date();
  document.getElementById('clock').innerHTML=
    d.toLocaleTimeString();
},1000);

// ===== UI CHANNEL (ASLI, TIDAK DIUBAH) =====
for(let i=1;i<=7;i++){
  container.innerHTML += `
  <div class="card">
    <h3>Channel ${i}</h3>

    ON <input type="time" id="on${i}">
    PEAK <input type="time" id="peak${i}">
    OFF <input type="time" id="off${i}">
    MAX <input type="number" id="max${i}" value="80">

    <button onclick="setSch(${i})">SAVE</button>
  </div>`;
}

// ===== MQTT =====
client.on('connect',()=>{
  statusEl.innerHTML="✅ Connected MQTT";
  statusEl.style.color="#0f0";

  client.subscribe("suhu/ntc1");
  client.subscribe("suhu/ntc2");
  client.subscribe("status/suhu");
  client.subscribe("status/mode");
});

client.on('error',()=>{
  statusEl.innerHTML="❌ MQTT Error";
  statusEl.style.color="#f00";
});

client.on('message',(topic,msg)=>{
  msg=msg.toString();

  if(topic=="suhu/ntc1"){
    document.getElementById('t1').innerHTML=msg;
  }

  if(topic=="suhu/ntc2"){
    document.getElementById('t2').innerHTML=msg;
  }

  if(topic=="status/suhu"){
    document.getElementById('statusSuhu').innerHTML=msg;
  }

  if(topic=="status/mode"){
    updateModeUI(msg);
  }
});

// ===== MODE =====
function setMode(m){
  client.publish("mode",m);
  updateModeUI(m);
}

function updateModeUI(m){
  document.getElementById('btnAuto').classList.remove("active");
  document.getElementById('btnManual').classList.remove("active");

  if(m=="auto") document.getElementById('btnAuto').classList.add("active");
  else document.getElementById('btnManual').classList.add("active");
}

// ===== TIME CONVERT =====
function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}

// ===== SAVE SCHEDULE =====
function setSch(i){
  let on = toMin(document.getElementById('on'+i).value);
  let peak = toMin(document.getElementById('peak'+i).value);
  let off = toMin(document.getElementById('off'+i).value);
  let max = Math.round(document.getElementById('max'+i).value*2.55);

  let data = `${on},${peak},${off},${max}`;

  client.publish(`set/schedule/${i}`,data);
  alert("Schedule CH"+i+" disimpan");
}

// ===== SAVE TEMP =====
function saveTemp(){
  let v=document.getElementById('maxTemp').value;
  client.publish("set/batasSuhu",v);
}

// ===== SAVE IDLE =====
function saveIdle(){
  let v=document.getElementById('idle').value;
  client.publish("set/idle",v);
  alert("Idle disimpan");
}
</script>

</body>
</html>
