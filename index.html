<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.header{
  padding:10px;
  text-align:center;
  font-size:18px;
  background:#111827;
}

#clock{
  font-size:22px;
  margin-top:5px;
  font-weight:bold;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.temp{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

button{
  padding:6px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#374151;
  color:white;
  cursor:pointer;
  font-size:12px;
}

.btn-auto.active{ background:#16a34a; }
.btn-manual.active{ background:#ea580c; }

input{
  width:100%;
  border-radius:6px;
  border:none;
  padding:4px;
  font-size:12px;
}

.row{
  display:flex;
  gap:4px;
}

.row div{
  flex:1;
  text-align:center;
  font-size:11px;
}

#status{
  text-align:center;
  padding:5px;
}
</style>
</head>

<body>

<div class="header">
  A8 Controller
  <div id="clock">--:--:--</div>
</div>

<div id="status">🔌 Connecting...</div>

<!-- ===== SUHU ===== -->
<div class="card">
  <div class="temp">Suhu Atas: <span id="t1">--</span> °C</div>
  <div class="temp">Suhu Bawah: <span id="t2">--</span> °C</div>

  <div style="margin-top:8px;">
    Batas Maks:
    <input type="number" id="batas" value="50">
    <button onclick="setBatas()">SAVE</button>
  </div>
</div>

<!-- ===== MODE ===== -->
<div class="card" style="text-align:center;">
<button id="btnAuto" class="btn-auto" onclick="setMode('auto')">AUTO</button>
<button id="btnManual" class="btn-manual" onclick="setMode('manual')">MANUAL</button>
</div>

<div id="channels"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

let connected=false;

const statusEl=document.getElementById('status');
const btnAuto=document.getElementById('btnAuto');
const btnManual=document.getElementById('btnManual');

const labels=[
"Royal Blue","Blue","Indigo","Red",
"Green","White","Sump"
];

// ===== CLOCK =====
setInterval(()=>{
  document.getElementById('clock').innerText =
    new Date().toLocaleTimeString('en-GB');
},1000);

// ===== MODE UI =====
function updateModeUI(mode){
  btnAuto.classList.remove('active');
  btnManual.classList.remove('active');

  if(mode==='auto') btnAuto.classList.add('active');
  else btnManual.classList.add('active');
}

// ===== SAFE SEND =====
function send(topic,msg){
  if(!connected){
    alert("MQTT belum connect");
    return;
  }
  client.publish(topic,msg);
}

// ===== MQTT =====
client.on('connect',()=>{
  connected=true;
  statusEl.innerHTML="✅ Connected";
  statusEl.style.color="#0f0";

  client.subscribe("suhu/ntc1");
  client.subscribe("suhu/ntc2");
  client.subscribe("status/mode");
  client.subscribe("status/suhu");
});

client.on('offline',()=>{
  connected=false;
  statusEl.innerHTML="❌ Offline";
});

client.on('message',(topic,msg)=>{
  msg=msg.toString();

  if(topic==="suhu/ntc1"){
    document.getElementById('t1').innerText=parseFloat(msg).toFixed(1);
  }

  if(topic==="suhu/ntc2"){
    document.getElementById('t2').innerText=parseFloat(msg).toFixed(1);
  }

  if(topic==="status/mode"){
    updateModeUI(msg);
  }

  if(topic==="status/suhu"){
    if(msg==="OVERHEAT"){
      statusEl.innerHTML="🔥 OVERHEAT!";
      statusEl.style.color="red";
    }
  }
});

// ===== MODE =====
function setMode(mode){
  send("mode",mode);
}

// ===== BATAS =====
function setBatas(){
  let val=document.getElementById('batas').value;
  send("set/batasSuhu",val);
  alert("Batas suhu disimpan");
}

// ===== CHANNEL UI =====
for(let i=1;i<=7;i++){
  document.getElementById('channels').innerHTML+=`
  <div class="card">
    <b>${labels[i-1]}</b>

    <div class="row">
      <div>ON<br><input type="time" id="on${i}"></div>
      <div>PEAK<br><input type="time" id="peak${i}"></div>
      <div>OFF<br><input type="time" id="off${i}"></div>
      <div>MAX<br><input type="number" id="max${i}" value="80"></div>
    </div>

    <button onclick="save(${i})">SAVE</button>

    <div style="margin-top:6px;">
      Manual %
      <input type="number" id="man${i}" value="0">
      <button onclick="manual(${i})">SET</button>
    </div>
  </div>`;
}

// ===== SAVE =====
function save(i){
  let on=toMin(document.getElementById('on'+i).value);
  let peak=toMin(document.getElementById('peak'+i).value);
  let off=toMin(document.getElementById('off'+i).value);
  let max=Math.round(document.getElementById('max'+i).value*2.55);

  send(`set/schedule/${i}`,`${on},${peak},${off},${max}`);
}

// ===== MANUAL =====
function manual(i){
  let val=parseInt(document.getElementById('man'+i).value);
  if(isNaN(val)) val=0;

  let pwm=Math.round(val*2.55);
  send(`manual/${i}`,pwm.toString());
}

// ===== UTIL =====
function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}
</script>

</body>
</html>
