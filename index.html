<!-- ... (bagian <head> dan <style> sama seperti versi sebelumnya, tambahkan ini di akhir <style>) -->
<style>
  /* Tambahan untuk pengaturan otomatis */
  #auto-settings { display: none; background: #1e3a5f; padding: 15px; border-radius: 10px; margin-top: 20px; }
  .auto-header { text-align: center; font-size: 18px; margin-bottom: 10px; }
  .auto-table { display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 8px; font-size: 14px; }
  .auto-header-row { font-weight: bold; background: #0a1f44; padding: 8px; text-align: center; border-radius: 6px; }
  .auto-channel { display: contents; }
  .auto-channel-name { padding: 8px; border-radius: 50%; width: 20px; height: 20px; text-align: center; line-height: 20px; font-size: 12px; margin-right: 8px; }
  .auto-input { padding: 6px; width: 70px; background: #212529; color: white; border: 1px solid #495057; border-radius: 4px; text-align: center; }
  #toggleAuto { display: block; margin: 15px auto; padding: 10px 20px; background: #0d6efd; border: none; border-radius: 6px; color: white; font-size: 16px; cursor: pointer; }
</style>

<!-- Di body, setelah <div id="chart-container"> ... </div> tambahkan ini -->
<button id="toggleAuto">Pengaturan Waktu Otomatis</button>

<div id="auto-settings">
  <div class="auto-header">Pengaturan Waktu Otomatis<br>8 Channel Lampu</div>
  
  <div class="auto-table">
    <div class="auto-header-row"></div>
    <div class="auto-header-row">Start</div>
    <div class="auto-header-row">Peak</div>
    <div class="auto-header-row">End</div>
    
    <div class="auto-channel">
      <div style="background: #20c997;" class="auto-channel-name">●</div> Royal Blue
      <input type="text" id="start0" class="auto-input" value="08:00">
      <input type="text" id="peak0" class="auto-input" value="12:00">
      <input type="text" id="end0" class="auto-input" value="20:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #0d6efd;" class="auto-channel-name">●</div> Blue
      <input type="text" id="start1" class="auto-input" value="08:00">
      <input type="text" id="peak1" class="auto-input" value="12:00">
      <input type="text" id="end1" class="auto-input" value="10:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #6f42c1;" class="auto-channel-name">●</div> Violet
      <input type="text" id="start2" class="auto-input" value="00:00">
      <input type="text" id="peak2" class="auto-input" value="10:00">
      <input type="text" id="end2" class="auto-input" value="10:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #dc3545;" class="auto-channel-name">●</div> Red
      <input type="text" id="start3" class="auto-input" value="09:00">
      <input type="text" id="peak3" class="auto-input" value="10:00">
      <input type="text" id="end3" class="auto-input" value="10:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #198754;" class="auto-channel-name">●</div> Green
      <input type="text" id="start4" class="auto-input" value="08:00">
      <input type="text" id="peak4" class="auto-input" value="10:00">
      <input type="text" id="end4" class="auto-input" value="16:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #f8f9fa; color:#000;" class="auto-channel-name">●</div> White
      <input type="text" id="start5" class="auto-input" value="09:00">
      <input type="text" id="peak5" class="auto-input" value="10:00">
      <input type="text" id="end5" class="auto-input" value="16:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #adb5bd; color:#000;" class="auto-channel-name">●</div> Sump
      <input type="text" id="start6" class="auto-input" value="11:00">
      <input type="text" id="peak6" class="auto-input" value="11:00">
      <input type="text" id="end6" class="auto-input" value="12:00">
    </div>
    
    <div class="auto-channel">
      <div style="background: #6c757d;" class="auto-channel-name">●</div> Fan
      <input type="text" id="start7" class="auto-input" value="08:00">
      <input type="text" id="peak7" class="auto-input" value="10:00">
      <input type="text" id="end7" class="auto-input" value="10:00">
    </div>
  </div>

  <button id="saveAuto" style="display: block; margin: 20px auto; padding: 10px 30px; background: #198754; border: none; border-radius: 6px; color: white; font-size: 16px; cursor: pointer;">Save Pengaturan Otomatis</button>
</div>

<!-- Di akhir <script>, tambahkan ini -->
<script>
  // ... (kode MQTT dan chart sebelumnya tetap)

  document.getElementById('toggleAuto').onclick = function() {
    var settings = document.getElementById('auto-settings');
    settings.style.display = (settings.style.display === 'block') ? 'none' : 'block';
    this.innerText = (settings.style.display === 'block') ? 'Sembunyikan Pengaturan' : 'Pengaturan Waktu Otomatis';
  };

  document.getElementById('saveAuto').onclick = function() {
    for (let i = 0; i < 8; i++) {
      client.publish(device/set/auto/channel/\( {i}/start, document.getElementById(start \){i}).value);
      client.publish(device/set/auto/channel/\( {i}/peak, document.getElementById(peak \){i}).value);
      client.publish(device/set/auto/channel/\( {i}/end, document.getElementById(end \){i}).value);
    }
    alert('Pengaturan waktu otomatis tersimpan!');
  };
</script>
