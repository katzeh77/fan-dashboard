<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A8 Controller</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1c2c;
  color:#fff;
  padding:10px;
}
.card{
  background:#132f4c;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}
h2{margin:5px 0}
.slider{width:100%}
input{width:60px}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00aaff;
  color:#fff;
}
</style>
</head>
<body>

<div class="card">
<h2 id="clock">--:--</h2>
Status: <span id="status">-</span>
</div>

<div class="card">
<h3>Suhu</h3>
Atas: <span id="t1">--</span> °C<br>
Bawah: <span id="t2">--</span> °C
</div>

<div class="card">
<h3>Batas Suhu</h3>
<input id="batas" type="number" value="50">
<button onclick="setBatas()">Simpan</button>
</div>

<div id="leds"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const names=[
"Royal Blue","Blue","Indigo","Red",
"Green","White","Sump","Fan"
];

const leds=document.getElementById('leds');

names.forEach((n,i)=>{
  leds.innerHTML+=`
  <div class="card">
  ${n}<br>
  <input type="range" min="0" max="100" value="0"
  oninput="setLED(${i},this.value)">
  </div>`;
});

function setLED(ch,val){
  client.publish("manual/"+ch,Math.round(val*2.55).toString());
}

function setBatas(){
  const v=document.getElementById('batas').value;
  client.publish("set/batasSuhu",v);
}

client.on('connect',()=>{
  client.subscribe("suhu/#");
  client.subscribe("status/suhu");
});

client.on('message',(t,m)=>{
  m=m.toString();
  if(t=="suhu/ntc1") document.getElementById('t1').innerHTML=m;
  if(t=="suhu/ntc2") document.getElementById('t2').innerHTML=m;
  if(t=="status/suhu") document.getElementById('status').innerHTML=m;
});

// JAM REALTIME
setInterval(()=>{
  const d=new Date();
  document.getElementById('clock').innerHTML=
  d.toLocaleTimeString();
},1000);
</script>

</body>
</html>
