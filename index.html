<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarium A8 Controller</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1a2a;
  color:white;
  text-align:center;
}

h1{
  margin:20px;
}

.container{
  max-width:400px;
  margin:auto;
}

.card{
  background:#132c44;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.slider{
  width:100%;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1e90ff;
  color:white;
  font-size:14px;
}

button:hover{
  background:#3aa0ff;
}
</style>
</head>

<body>

<h1>LED A8 Controller</h1>

<div class="container">

<div class="card">
  <button onclick="setMode('auto')">AUTO</button>
  <button onclick="setMode('manual')">MANUAL</button>
</div>

<div id="channels"></div>

</div>

<script>
const client = mqtt.connect("wss://broker.emqx.io:8084/mqtt");

// ===== LABEL BARU =====
const names = [
  "Royal Blue",
  "Blue",
  "Indigo",
  "Red",
  "Green",
  "White",
  "Sump",
  "Fan"
];

// ===== BUILD UI =====
const container = document.getElementById("channels");

names.forEach((name,i)=>{
  container.innerHTML += `
  <div class="card">
    <h3>CH${i+1} - ${name}</h3>
    <input type="range" min="0" max="255" value="0" class="slider" id="ch${i}">
    <p id="val${i}">0</p>
  </div>`;
});

// ===== CONNECT =====
client.on("connect",()=>{
  console.log("MQTT Connected");
});

// ===== MODE =====
function setMode(m){
  client.publish("mode",m);
  alert("Mode: "+m);
}

// ===== SLIDER =====
for(let i=0;i<8;i++){
  let s=document.getElementById("ch"+i);
  let v=document.getElementById("val"+i);

  s.oninput=()=>{
    v.innerText=s.value;

    client.publish("manual/"+i,s.value);
  }
}
</script>

</body>
</html>
