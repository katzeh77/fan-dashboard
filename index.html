<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.header{
  padding:15px;
  text-align:center;
  font-size:20px;
  background:#111827;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:15px;
  border-radius:15px;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}

input{width:100%;}
</style>
</head>

<body>

<div class="header">A8 Controller</div>

<div class="card">
<button onclick="setMode(1)">AUTO</button>
<button onclick="setMode(0)">MANUAL</button>
</div>

<div id="channels"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const container=document.getElementById('channels');

for(let i=1;i<=8;i++){
  container.innerHTML+=`
  <div class="card">
    <h3>Channel ${i}</h3>

    ON <input type="time" id="on${i}">
    PEAK <input type="time" id="peak${i}">
    OFF <input type="time" id="off${i}">
    MAX <input type="number" id="max${i}" value="80">

    <button onclick="setSch(${i})">SAVE</button>
  </div>`;
}

function setMode(v){
  client.publish('mode/auto',v.toString());
}

function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}

function setSch(i){
  let on=toMin(document.getElementById('on'+i).value);
  let peak=toMin(document.getElementById('peak'+i).value);
  let off=toMin(document.getElementById('off'+i).value);
  let max=Math.round(document.getElementById('max'+i).value*2.55);

  client.publish(`set/schedule/${i}`,`${on},${peak},${off},${max}`);
}
</script>

</body>
</html>
