<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarium LED Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .content {
            padding: 20px;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status-card h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .temp-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .temp-item {
            text-align: center;
        }

        .temp-value {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
        }

        .temp-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .max-temp-control {
            margin-top: 15px;
        }

        .max-temp-control label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .max-temp-control input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .max-temp-control button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .warning {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .warning.show {
            display: block;
        }

        .schedule-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .schedule-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .schedule-point {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-input input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .channel-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .channel-item {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 5px;
            border-left: 3px solid;
        }

        .channel-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: bold;
            color: #2c3e50;
        }

        .channel-item input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 13px;
            text-align: center;
        }

        .channel-item input:focus {
            outline: none;
            border-color: #3498db;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }

        button:hover {
            background: #34495e;
        }

        button.danger {
            background: #e74c3c;
        }

        button.danger:hover {
            background: #c0392b;
        }

        button.success {
            background: #27ae60;
        }

        button.success:hover {
            background: #229954;
        }

        button.info {
            background: #3498db;
        }

        button.info:hover {
            background: #2980b9;
        }

        .chart-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }

        .manual-control {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .manual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .manual-item {
            background: white;
            padding: 8px;
            border-radius: 5px;
            text-align: center;
        }

        .manual-item label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 12px;
            color: #2c3e50;
        }

        .manual-item input {
            width: 100%;
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: center;
            font-size: 13px;
        }

        .live-view {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }

        .current-levels {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .level-item {
            text-align: center;
            padding: 5px;
            background: white;
            border-radius: 5px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .channel-inputs {
                grid-template-columns: 1fr;
            }
            .manual-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Aquarium LED Controller</h1>
            <p>Smart Lighting Management System</p>
        </div>

        <div class="content">
            <div class="status-panel">
                <div class="status-card">
                    <h3>🌡️ Temperature Status</h3>
                    <div class="temp-display">
                        <div class="temp-item">
                            <div class="temp-value" id="temp1">--.-</div>
                            <div class="temp-label">Upper Temperature</div>
                        </div>
                        <div class="temp-item">
                            <div class="temp-value" id="temp2">--.-</div>
                            <div class="temp-label">Lower Temperature</div>
                        </div>
                    </div>
                    <div class="max-temp-control">
                        <label>Maximum Temperature Limit (°C)</label>
                        <input type="number" id="maxTemp" step="0.5" value="35.0">
                        <button onclick="setMaxTemperature()">Set Limit</button>
                    </div>
                    <div class="warning" id="warning">
                        ⚠️ <span id="warningMsg"></span>
                    </div>
                </div>

                <div class="status-card">
                    <h3>💨 Fan Status</h3>
                    <div class="live-view" id="fanStatus">Fan: OFF ❄️</div>
                    <h3>💡 Current LED Levels</h3>
                    <div id="currentLevels" class="current-levels"></div>
                </div>
            </div>

            <div class="schedule-section">
                <h3>📊 Lighting Schedule</h3>
                <div id="schedulePoints"></div>
                <div class="button-group">
                    <button onclick="addSchedulePoint()" class="success" id="btnAddSchedule">+ Add Schedule Point</button>
                    <button onclick="saveSchedule()" class="info">💾 Save Schedule to ESP32</button>
                    <button onclick="loadScheduleFromESP()" class="info">📥 Load from ESP32</button>
                    <button onclick="resetToDefault()" class="danger">🔄 Reset to Default</button>
                </div>
            </div>

            <div class="chart-container">
                <h3>📈 Lighting Schedule Graph</h3>
                <canvas id="scheduleChart"></canvas>
            </div>

            <div class="manual-control">
                <h3>🎮 Manual Control</h3>
                <div class="manual-grid" id="manualChannels"></div>
                <div class="button-group" style="margin-top: 15px;">
                    <button onclick="setAllChannels(0)" class="danger">All OFF</button>
                    <button onclick="setAllChannels(50)" class="info">All 50%</button>
                    <button onclick="setAllChannels(100)" class="success">All 100%</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // MQTT Configuration
        const mqttBroker = 'wss://broker.emqx.io:8084/mqtt';
        const topicPrefix = 'aquarium/controller';
        
        let client = null;
        let scheduleData = [];
        let chart = null;
        
        // Channel configurations with colors
        const channels = [
            { name: 'Royal Blue', color: '#4169E1' },
            { name: 'Blue', color: '#0000FF' },
            { name: 'Violet', color: '#8B00FF' },
            { name: 'Red', color: '#FF0000' },
            { name: 'Green', color: '#00FF00' },
            { name: 'White', color: '#FFFFFF', textColor: '#333' },
            { name: 'Sump', color: '#FFA500' }
        ];
        
        // Initialize MQTT
        function initMQTT() {
            console.log('Connecting to MQTT...');
            client = mqtt.connect(mqttBroker);
            
            client.on('connect', () => {
                console.log('Connected to MQTT broker');
                client.subscribe(topicPrefix + '/status');
                setTimeout(() => loadScheduleFromESP(), 1000);
            });
            
            client.on('message', (topic, message) => {
                if (topic === topicPrefix + '/status') {
                    try {
                        const data = JSON.parse(message.toString());
                        updateUI(data);
                    } catch(e) {
                        console.error('Parse error:', e);
                    }
                }
            });
            
            client.on('error', (err) => {
                console.error('MQTT error:', err);
            });
        }
        
        // Update UI with status data
        function updateUI(data) {
            document.getElementById('temp1').textContent = data.temperature1 ? data.temperature1.toFixed(1) : '--.-';
            document.getElementById('temp2').textContent = data.temperature2 ? data.temperature2.toFixed(1) : '--.-';
            document.getElementById('maxTemp').value = data.maxTemperature || 35;
            
            const fanStatus = data.fanState ? 'ON 🔥' : 'OFF ❄️';
            document.getElementById('fanStatus').innerHTML = `Fan: ${fanStatus}`;
            
            if (data.overheat) {
                const warning = document.getElementById('warning');
                warning.classList.add('show');
                document.getElementById('warningMsg').innerHTML = 
                    `⚠️ LAMPU PANAS! Suhu melebihi batas (${data.maxTemperature}°C). 
                     Suhu Atas: ${data.temperature1 ? data.temperature1.toFixed(1) : '--'}°C, 
                     Suhu Bawah: ${data.temperature2 ? data.temperature2.toFixed(1) : '--'}°C - Semua lampu dimatikan!`;
            } else {
                document.getElementById('warning').classList.remove('show');
            }
            
            // Update current levels display
            if (data.levels) {
                const levelsHtml = channels.map((ch, idx) => 
                    `<div class="level-item" style="border-left: 3px solid ${ch.color}">
                        <strong>${ch.name}</strong><br>
                        <span style="font-size: 16px; font-weight: bold;">${data.levels[idx] ? data.levels[idx].toFixed(1) : 0}%</span>
                    </div>`
                ).join('');
                document.getElementById('currentLevels').innerHTML = levelsHtml;
            }
        }
        
        // Add schedule point
        function addSchedulePoint() {
            console.log('Add schedule point clicked');
            // Find a reasonable default time (midpoint between existing points)
            let defaultTime = '12:00';
            if (scheduleData.length > 0) {
                const times = scheduleData.map(p => p.time);
                times.sort();
                // Suggest time at midpoint
                defaultTime = '12:00';
            }
            
            const defaultLevels = channels.map(() => 0);
            scheduleData.push({
                time: defaultTime,
                levels: [...defaultLevels]
            });
            scheduleData.sort((a, b) => a.time.localeCompare(b.time));
            renderSchedulePoints();
            updateChart();
            console.log('Schedule points count:', scheduleData.length);
        }
        
        // Render schedule points UI with text inputs
        function renderSchedulePoints() {
            const container = document.getElementById('schedulePoints');
            if (!container) return;
            
            container.innerHTML = '';
            
            if (scheduleData.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No schedule points. Click "Add Schedule Point" to start.</p>';
                return;
            }
            
            scheduleData.forEach((point, idx) => {
                const pointDiv = document.createElement('div');
                pointDiv.className = 'schedule-point';
                pointDiv.setAttribute('data-idx', idx);
                
                // Create header
                const headerDiv = document.createElement('div');
                headerDiv.className = 'schedule-header';
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'time-input';
                const timeInput = document.createElement('input');
                timeInput.type = 'time';
                timeInput.value = point.time;
                timeInput.onchange = (function(i) {
                    return function(e) { updateScheduleTime(i, e.target.value); };
                })(idx);
                timeDiv.appendChild(timeInput);
                
                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'Remove';
                removeBtn.className = 'danger';
                removeBtn.onclick = (function(i) {
                    return function() { removeSchedulePoint(i); };
                })(idx);
                
                headerDiv.appendChild(timeDiv);
                headerDiv.appendChild(removeBtn);
                pointDiv.appendChild(headerDiv);
                
                // Create channel inputs
                const channelDiv = document.createElement('div');
                channelDiv.className = 'channel-inputs';
                
                channels.forEach((ch, chIdx) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'channel-item';
                    itemDiv.style.borderLeftColor = ch.color;
                    
                    const label = document.createElement('label');
                    label.textContent = ch.name;
                    
                    const input = document.createElement('input');
                    input.type = 'number';
                    input.min = 0;
                    input.max = 100;
                    input.step = 1;
                    input.value = point.levels[chIdx];
                    input.onchange = (function(pIdx, cIdx) {
                        return function(e) { updateScheduleLevel(pIdx, cIdx, e.target.value); };
                    })(idx, chIdx);
                    
                    const small = document.createElement('small');
                    small.textContent = '%';
                    small.style.display = 'block';
                    small.style.textAlign = 'center';
                    small.style.marginTop = '5px';
                    
                    itemDiv.appendChild(label);
                    itemDiv.appendChild(input);
                    itemDiv.appendChild(small);
                    channelDiv.appendChild(itemDiv);
                });
                
                pointDiv.appendChild(channelDiv);
                container.appendChild(pointDiv);
            });
        }
        
        // Update schedule time
        function updateScheduleTime(index, time) {
            if (scheduleData[index]) {
                scheduleData[index].time = time;
                scheduleData.sort((a, b) => a.time.localeCompare(b.time));
                renderSchedulePoints();
                updateChart();
            }
        }
        
        // Update schedule level
        function updateScheduleLevel(pointIdx, channelIdx, value) {
            if (!scheduleData[pointIdx]) return;
            let newValue = parseInt(value);
            if (isNaN(newValue)) newValue = 0;
            newValue = Math.min(100, Math.max(0, newValue));
            scheduleData[pointIdx].levels[channelIdx] = newValue;
            updateChart();
        }
        
        // Remove schedule point
        function removeSchedulePoint(index) {
            if (scheduleData.length > 1) {
                scheduleData.splice(index, 1);
                renderSchedulePoints();
                updateChart();
            } else {
                alert("Cannot remove the last schedule point! At least one point is required.");
            }
        }
        
        // Update chart
        function updateChart() {
            if (!chart) return;
            
            const timeLabels = [];
            const datasets = channels.map((ch, idx) => ({
                label: ch.name,
                data: [],
                borderColor: ch.color,
                backgroundColor: ch.color + '20',
                borderWidth: 2,
                tension: 0.4,
                fill: true,
                pointRadius: 0
            }));
            
            // Generate 24-hour data points (every 30 minutes)
            for (let hour = 0; hour < 24; hour++) {
                for (let minute = 0; minute < 60; minute += 30) {
                    const timeStr = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                    timeLabels.push(timeStr);
                    
                    const levels = getInterpolatedLevels(timeStr);
                    datasets.forEach((ds, idx) => {
                        ds.data.push(levels[idx]);
                    });
                }
            }
            
            chart.data.labels = timeLabels;
            chart.data.datasets = datasets;
            chart.update();
        }
        
        // Get interpolated levels for a specific time
        function getInterpolatedLevels(time) {
            if (scheduleData.length === 0) return channels.map(() => 0);
            
            const timeMinutes = timeToMinutes(time);
            let prevPoint = null;
            let nextPoint = null;
            
            for (let i = 0; i < scheduleData.length; i++) {
                const pointMinutes = timeToMinutes(scheduleData[i].time);
                if (pointMinutes <= timeMinutes) {
                    prevPoint = scheduleData[i];
                } else if (!nextPoint) {
                    nextPoint = scheduleData[i];
                }
            }
            
            if (!prevPoint) prevPoint = scheduleData[scheduleData.length - 1];
            if (!nextPoint) nextPoint = scheduleData[0];
            
            let prevMinutes = timeToMinutes(prevPoint.time);
            let nextMinutes = timeToMinutes(nextPoint.time);
            
            if (nextMinutes < prevMinutes) nextMinutes += 1440;
            let currentMinutes = timeMinutes;
            if (currentMinutes < prevMinutes) currentMinutes += 1440;
            
            const ratio = (currentMinutes - prevMinutes) / (nextMinutes - prevMinutes);
            
            return channels.map((_, idx) => {
                const start = prevPoint.levels[idx];
                const end = nextPoint.levels[idx];
                return Math.round(start + (end - start) * ratio);
            });
        }
        
        // Convert time string to minutes
        function timeToMinutes(time) {
            const parts = time.split(':');
            const hours = parseInt(parts[0]) || 0;
            const minutes = parseInt(parts[1]) || 0;
            return hours * 60 + minutes;
        }
        
        // Save schedule to ESP
        function saveSchedule() {
            if (!client || !client.connected) {
                alert('MQTT not connected! Please check your connection.');
                return;
            }
            
            const scheduleForESP = {
                count: scheduleData.length,
                schedules: scheduleData.map(point => ({
                    hour: parseInt(point.time.split(':')[0]),
                    minute: parseInt(point.time.split(':')[1]),
                    levels: point.levels.map(l => parseFloat(l))
                }))
            };
            
            const message = JSON.stringify(scheduleForESP);
            client.publish(topicPrefix + '/schedule', message);
            alert('✅ Schedule saved to ESP32 successfully!');
        }
        
        // Load schedule from ESP
        function loadScheduleFromESP() {
            resetToDefault();
        }
        
        // Reset to default schedule
        function resetToDefault() {
            scheduleData = [];
            addSchedulePoint('00:00');
            // Update levels for 00:00
            if (scheduleData[0]) {
                scheduleData[0].levels = [0, 0, 0, 0, 0, 0, 0];
            }
            addSchedulePoint('06:00');
            if (scheduleData[1]) {
                scheduleData[1].levels = [30, 20, 15, 40, 25, 50, 80];
            }
            addSchedulePoint('09:00');
            if (scheduleData[2]) {
                scheduleData[2].levels = [70, 50, 40, 85, 60, 90, 100];
            }
            addSchedulePoint('12:00');
            if (scheduleData[3]) {
                scheduleData[3].levels = [100, 80, 60, 100, 80, 100, 100];
            }
            addSchedulePoint('15:00');
            if (scheduleData[4]) {
                scheduleData[4].levels = [80, 60, 45, 90, 65, 95, 100];
            }
            addSchedulePoint('18:00');
            if (scheduleData[5]) {
                scheduleData[5].levels = [50, 35, 25, 70, 45, 75, 90];
            }
            addSchedulePoint('22:00');
            if (scheduleData[6]) {
                scheduleData[6].levels = [10, 5, 5, 20, 10, 30, 50];
            }
            addSchedulePoint('23:59');
            if (scheduleData[7]) {
                scheduleData[7].levels = [0, 0, 0, 0, 0, 0, 0];
            }
            renderSchedulePoints();
            updateChart();
        }
        
        // Set max temperature
        function setMaxTemperature() {
            if (!client || !client.connected) {
                alert('MQTT not connected!');
                return;
            }
            
            const maxTemp = parseFloat(document.getElementById('maxTemp').value);
            if (isNaN(maxTemp)) {
                alert('Please enter a valid temperature!');
                return;
            }
            
            client.publish(topicPrefix + '/maxTemp', JSON.stringify({ maxTemp: maxTemp }));
            alert(`✅ Maximum temperature limit set to ${maxTemp}°C`);
        }
        
        // Manual control functions
        function renderManualControls() {
            const container = document.getElementById('manualChannels');
            if (!container) return;
            
            container.innerHTML = '';
            channels.forEach((ch, idx) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'manual-item';
                
                const label = document.createElement('label');
                label.textContent = ch.name;
                
                const input = document.createElement('input');
                input.type = 'number';
                input.min = 0;
                input.max = 100;
                input.step = 1;
                input.value = 0;
                input.id = `manual_${idx}`;
                input.onchange = (function(i) {
                    return function(e) { sendManualControl(i, e.target.value); };
                })(idx);
                
                itemDiv.appendChild(label);
                itemDiv.appendChild(input);
                container.appendChild(itemDiv);
            });
        }
        
        // Send manual control
        function sendManualControl(channel, level) {
            if (!client || !client.connected) {
                alert('MQTT not connected!');
                return;
            }
            
            const newLevel = parseInt(level);
            if (isNaN(newLevel)) return;
            
            client.publish(topicPrefix + '/manual', JSON.stringify({
                channel: channel,
                level: newLevel
            }));
        }
        
        // Set all channels to same value
        function setAllChannels(value) {
            for (let i = 0; i < channels.length; i++) {
                const input = document.getElementById(`manual_${i}`);
                if (input) {
                    input.value = value;
                    sendManualControl(i, value);
                }
            }
        }
        
        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('scheduleChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Intensity (%)',
                                font: { size: 14, weight: 'bold' }
                            },
                            grid: { color: '#ddd' }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time (Hours)',
                                font: { size: 14, weight: 'bold' }
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                stepSize: 2
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                font: { size: 10 }
                            }
                        }
                    }
                }
            });
        }
        
        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, initializing...');
            initChart();
            renderManualControls();
            initMQTT();
            resetToDefault();
        });
    </script>
</body>
