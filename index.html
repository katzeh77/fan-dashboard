<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b0f1a;
  color:#fff;
}

.header{
  padding:10px;
  text-align:center;
  font-size:18px;
  background:#111827;
}

#clock{
  font-size:22px;
  margin-top:5px;
  font-weight:bold;
}

.card{
  background:#1f2937;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  padding:6px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  font-size:12px;
}

button:active{ background:#1d4ed8; }

input{
  width:100%;
  border-radius:6px;
  border:none;
  padding:4px;
  font-size:12px;
}

.row{
  display:flex;
  gap:4px;
  align-items:center;
}

.row div{
  flex:1;
  text-align:center;
  font-size:11px;
}

#status{
  text-align:center;
  padding:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  A8 Controller
  <div id="clock">--:--:--</div>
</div>

<div id="status">🔌 Connecting...</div>

<div class="card" style="text-align:center;">
<button onclick="setMode('auto')">AUTO</button>
<button onclick="setMode('manual')">MANUAL</button>
</div>

<div id="channels"></div>

<script>
const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

const container = document.getElementById('channels');
const statusEl = document.getElementById('status');

const labels = [
"Royal Blue","Blue","Indigo","Red",
"Green","White","Sump"
];

// ===== CLOCK =====
function updateClock(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock').innerText = `${h}:${m}:${s}`;
}
setInterval(updateClock,1000);
updateClock();

// ===== UI =====
for(let i=1;i<=7;i++){
  container.innerHTML += `
  <div class="card">
    <b>${labels[i-1]}</b>

    <div class="row">
      <div>ON<br><input type="time" id="on${i}"></div>
      <div>PEAK<br><input type="time" id="peak${i}"></div>
      <div>OFF<br><input type="time" id="off${i}"></div>
      <div>MAX<br><input type="number" id="max${i}" value="80"></div>
    </div>

    <button onclick="setSch(${i})">SAVE</button>

    <div style="margin-top:6px;">
      Manual %
      <input type="number" id="man${i}" value="0">
      <button onclick="setManual(${i})">SET</button>
    </div>
  </div>`;
}

// ===== MQTT =====
client.on('connect',()=>{
  statusEl.innerHTML="✅ Connected";
  statusEl.style.color="#0f0";
});

client.on('error',()=>{
  statusEl.innerHTML="❌ Error";
  statusEl.style.color="#f00";
});

// ===== MODE =====
function setMode(mode){
  client.publish('mode',mode);
  alert("Mode: "+mode.toUpperCase());
}

// ===== TIME CONVERT =====
function toMin(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}

// ===== SAVE =====
function setSch(i){
  let on = toMin(document.getElementById('on'+i).value);
  let peak = toMin(document.getElementById('peak'+i).value);
  let off = toMin(document.getElementById('off'+i).value);
  let max = Math.round(document.getElementById('max'+i).value*2.55);

  let data = `${on},${peak},${off},${max}`;

  client.publish(`set/schedule/${i}`,data);
  alert("Saved CH"+i);
}

// ===== MANUAL =====
function setManual(i){
  let val = parseInt(document.getElementById('man'+i).value);

  if(isNaN(val)) val=0;
  val = Math.max(0,Math.min(100,val));

  let pwm = Math.round(val*2.55);

  client.publish(`manual/${i}`,pwm.toString());

  alert("Manual CH"+i+" = "+val+"%");
}
</script>

</body>
</html>
