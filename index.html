<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquarium LED Controller</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
        }

        .content {
            padding: 20px;
        }

        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .status-card h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .temp-display {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .temp-item {
            text-align: center;
        }

        .temp-value {
            font-size: 32px;
            font-weight: bold;
            color: #e74c3c;
        }

        .temp-label {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        .max-temp-control {
            margin-top: 15px;
        }

        .max-temp-control label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .max-temp-control input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .max-temp-control button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .warning {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        .warning.show {
            display: block;
        }

        .schedule-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .schedule-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .schedule-controls {
            margin-bottom: 20px;
        }

        .schedule-point {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .time-input {
            display: flex;
            gap: 10px;
        }

        .time-input input {
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        .channel-sliders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .channel-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }

        .channel-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: bold;
        }

        .channel-item input {
            width: 100%;
        }

        .channel-value {
            font-size: 12px;
            text-align: center;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #34495e;
        }

        button.danger {
            background: #e74c3c;
        }

        button.success {
            background: #27ae60;
        }

        .chart-container {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }

        .manual-control {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .live-view {
            background: #ecf0f1;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .channel-sliders {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Aquarium LED Controller</h1>
            <p>Smart Lighting Management System</p>
        </div>

        <div class="content">
            <div class="status-panel">
                <div class="status-card">
                    <h3>🌡️ Temperature Status</h3>
                    <div class="temp-display">
                        <div class="temp-item">
                            <div class="temp-value" id="temp1">--.-</div>
                            <div class="temp-label">Upper Temperature</div>
                        </div>
                        <div class="temp-item">
                            <div class="temp-value" id="temp2">--.-</div>
                            <div class="temp-label">Lower Temperature</div>
                        </div>
                    </div>
                    <div class="max-temp-control">
                        <label>Maximum Temperature Limit (°C)</label>
                        <input type="number" id="maxTemp" step="0.5" value="35.0">
                        <button onclick="setMaxTemperature()">Set Limit</button>
                    </div>
                    <div class="warning" id="warning">
                        ⚠️ <span id="warningMsg"></span>
                    </div>
                </div>

                <div class="status-card">
                    <h3>💨 Fan Status</h3>
                    <div class="live-view" id="fanStatus">Fan: OFF</div>
                    <h3>💡 Current LED Levels</h3>
                    <div id="currentLevels"></div>
                </div>
            </div>

            <div class="schedule-section">
                <h3>📊 Lighting Schedule</h3>
                <div id="schedulePoints"></div>
                <div class="button-group">
                    <button onclick="addSchedulePoint()" class="success">+ Add Schedule Point</button>
                    <button onclick="saveSchedule()">💾 Save Schedule</button>
                    <button onclick="loadScheduleFromESP()">📥 Load from ESP</button>
                </div>
            </div>

            <div class="chart-container">
                <h3>📈 Lighting Schedule Graph</h3>
                <canvas id="scheduleChart"></canvas>
            </div>

            <div class="manual-control">
                <h3>🎮 Manual Control</h3>
                <div id="manualChannels"></div>
            </div>
        </div>
    </div>

    <script>
        // MQTT Configuration
        const mqttBroker = 'wss://broker.emqx.io:8084/mqtt';
        const topicPrefix = 'aquarium/controller';
        
        let client = null;
        let scheduleData = [];
        let chart = null;
        
        // Channel configurations
        const channels = [
            'Royal Blue', 'Blue', 'Violet', 'Red', 'Green', 'White', 'Sump'
        ];
        
        // Initialize MQTT
        function initMQTT() {
            client = mqtt.connect(mqttBroker);
            
            client.on('connect', () => {
                console.log('Connected to MQTT broker');
                client.subscribe(topicPrefix + '/status');
                loadScheduleFromESP();
            });
            
            client.on('message', (topic, message) => {
                if (topic === topicPrefix + '/status') {
                    const data = JSON.parse(message.toString());
                    updateUI(data);
                }
            });
            
            client.on('error', (err) => {
                console.error('MQTT error:', err);
            });
        }
        
        // Update UI with status data
        function updateUI(data) {
            document.getElementById('temp1').textContent = data.temperature1.toFixed(1);
            document.getElementById('temp2').textContent = data.temperature2.toFixed(1);
            document.getElementById('maxTemp').value = data.maxTemperature;
            
            const fanStatus = data.fanState ? 'ON 🔥' : 'OFF ❄️';
            document.getElementById('fanStatus').innerHTML = `Fan: ${fanStatus}`;
            
            if (data.overheat) {
                const warning = document.getElementById('warning');
                warning.classList.add('show');
                document.getElementById('warningMsg').innerHTML = 
                    `LAMPU PANAS! Suhu melebihi batas (${data.maxTemperature}°C). 
                     Suhu Atas: ${data.temperature1.toFixed(1)}°C, 
                     Suhu Bawah: ${data.temperature2.toFixed(1)}°C`;
            } else {
                document.getElementById('warning').classList.remove('show');
            }
            
            // Update current levels display
            const levelsHtml = channels.map((ch, idx) => 
                `<div>${ch}: ${data.levels[idx].toFixed(1)}%</div>`
            ).join('');
            document.getElementById('currentLevels').innerHTML = levelsHtml;
        }
        
        // Add schedule point
        function addSchedulePoint(time = '12:00', levels = null) {
            const defaultLevels = levels || channels.map(() => 0);
            scheduleData.push({
                time: time,
                levels: defaultLevels
            });
            scheduleData.sort((a, b) => a.time.localeCompare(b.time));
            renderSchedulePoints();
            updateChart();
        }
        
        // Render schedule points UI
        function renderSchedulePoints() {
            const container = document.getElementById('schedulePoints');
            container.innerHTML = '';
            
            scheduleData.forEach((point, idx) => {
                const pointDiv = document.createElement('div');
                pointDiv.className = 'schedule-point';
                pointDiv.innerHTML = `
                    <div class="schedule-header">
                        <div class="time-input">
                            <input type="time" value="${point.time}" onchange="updateScheduleTime(${idx}, this.value)">
                        </div>
                        <button onclick="removeSchedulePoint(${idx})" class="danger">Remove</button>
                    </div>
                    <div class="channel-sliders">
                        ${channels.map((ch, chIdx) => `
                            <div class="channel-item">
                                <label>${ch}</label>
                                <input type="range" min="0" max="100" value="${point.levels[chIdx]}" 
                                       onchange="updateScheduleLevel(${idx}, ${chIdx}, this.value)">
                                <div class="channel-value">${point.levels[chIdx]}%</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(pointDiv);
            });
        }
        
        // Update schedule time
        function updateScheduleTime(index, time) {
            scheduleData[index].time = time;
            scheduleData.sort((a, b) => a.time.localeCompare(b.time));
            renderSchedulePoints();
            updateChart();
        }
        
        // Update schedule level
        function updateScheduleLevel(pointIdx, channelIdx, value) {
            scheduleData[pointIdx].levels[channelIdx] = parseInt(value);
            renderSchedulePoints();
            updateChart();
        }
        
        // Remove schedule point
        function removeSchedulePoint(index) {
            scheduleData.splice(index, 1);
            renderSchedulePoints();
            updateChart();
        }
        
        // Update chart
        function updateChart() {
            if (!chart) return;
            
            const timeLabels = [];
            const datasets = channels.map((ch, idx) => ({
                label: ch,
                data: [],
                borderColor: `hsl(${idx * 45}, 70%, 50%)`,
                backgroundColor: `hsla(${idx * 45}, 70%, 50%, 0.1)`,
                tension: 0.4,
                fill: true
            }));
            
            // Generate 24-hour data points
            for (let hour = 0; hour < 24; hour++) {
                for (let minute = 0; minute < 60; minute += 30) {
                    const timeStr = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
                    timeLabels.push(timeStr);
                    
                    const levels = getInterpolatedLevels(timeStr);
                    datasets.forEach((ds, idx) => {
                        ds.data.push(levels[idx]);
                    });
                }
            }
            
            chart.data.labels = timeLabels;
            chart.data.datasets = datasets;
            chart.update();
        }
        
        // Get interpolated levels for a specific time
        function getInterpolatedLevels(time) {
            if (scheduleData.length === 0) return channels.map(() => 0);
            
            const timeMinutes = timeToMinutes(time);
            let prevPoint = null;
            let nextPoint = null;
            
            for (let i = 0; i < scheduleData.length; i++) {
                const pointMinutes = timeToMinutes(scheduleData[i].time);
                if (pointMinutes <= timeMinutes) {
                    prevPoint = scheduleData[i];
                } else if (!nextPoint) {
                    nextPoint = scheduleData[i];
                }
            }
            
            if (!prevPoint) prevPoint = scheduleData[scheduleData.length - 1];
            if (!nextPoint) nextPoint = scheduleData[0];
            
            let prevMinutes = timeToMinutes(prevPoint.time);
            let nextMinutes = timeToMinutes(nextPoint.time);
            
            if (nextMinutes < prevMinutes) nextMinutes += 1440;
            let currentMinutes = timeMinutes;
            if (currentMinutes < prevMinutes) currentMinutes += 1440;
            
            const ratio = (currentMinutes - prevMinutes) / (nextMinutes - prevMinutes);
            
            return channels.map((_, idx) => {
                const start = prevPoint.levels[idx];
                const end = nextPoint.levels[idx];
                return start + (end - start) * ratio;
            });
        }
        
        // Convert time string to minutes
        function timeToMinutes(time) {
            const [hours, minutes] = time.split(':').map(Number);
            return hours * 60 + minutes;
        }
        
        // Save schedule to ESP
        function saveSchedule() {
            if (!client || !client.connected) {
                alert('MQTT not connected!');
                return;
            }
            
            const scheduleForESP = {
                count: scheduleData.length,
                schedules: scheduleData.map(point => ({
                    hour: parseInt(point.time.split(':')[0]),
                    minute: parseInt(point.time.split(':')[1]),
                    levels: point.levels
                }))
            };
            
            client.publish(topicPrefix + '/schedule', JSON.stringify(scheduleForESP));
            alert('Schedule saved to ESP32!');
        }
        
        // Load schedule from ESP
        function loadScheduleFromESP() {
            // This would require ESP to publish its schedule
            // For now, create default schedule
            if (scheduleData.length === 0) {
                addSchedulePoint('06:00', [0, 0, 0, 0, 0, 0, 0]);
                addSchedulePoint('08:00', [50, 30, 20, 60, 40, 80, 100]);
                addSchedulePoint('12:00', [80, 60, 40, 100, 70, 100, 100]);
                addSchedulePoint('18:00', [60, 40, 30, 80, 50, 90, 100]);
                addSchedulePoint('22:00', [10, 5, 5, 20, 10, 30, 50]);
                addSchedulePoint('00:00', [0, 0, 0, 0, 0, 0, 0]);
            }
        }
        
        // Set max temperature
        function setMaxTemperature() {
            if (!client || !client.connected) {
                alert('MQTT not connected!');
                return;
            }
            
            const maxTemp = parseFloat(document.getElementById('maxTemp').value);
            client.publish(topicPrefix + '/maxTemp', JSON.stringify({ maxTemp: maxTemp }));
            alert('Maximum temperature limit updated!');
        }
        
        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('scheduleChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: []
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Intensity (%)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: 'Time'
                            },
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        // Render manual controls
        function renderManualControls() {
            const container = document.getElementById('manualChannels');
            container.innerHTML = channels.map((ch, idx) => `
                <div style="margin-bottom: 10px;">
                    <label>${ch}</label>
                    <input type="range" min="0" max="100" value="0" id="manual_${idx}" 
                           onchange="sendManualControl(${idx}, this.value)">
                    <span id="manual_val_${idx}">0%</span>
                </div>
            `).join('');
        }
        
        // Send manual control
        function sendManualControl(channel, level) {
            if (!client || !client.connected) {
                alert('MQTT not connected!');
                return;
            }
            
            document.getElementById(`manual_val_${channel}`).textContent = `${level}%`;
            client.publish(topicPrefix + '/manual', JSON.stringify({
                channel: channel,
                level: parseInt(level)
            }));
        }
        
        // Initialize everything
        window.onload = () => {
            initChart();
            renderManualControls();
            initMQTT();
            
            // Update manual control displays
            setInterval(() => {
                channels.forEach((_, idx) => {
                    const slider = document.getElementById(`manual_${idx}`);
                    if (slider) {
                        document.getElementById(`manual_val_${idx}`).textContent = `${slider.value}%`;
                    }
                });
            }, 100);
        };
    </script>
</body>
</html>
